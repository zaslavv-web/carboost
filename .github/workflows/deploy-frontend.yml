name: Deploy Frontend

on:
  push:
    branches: [main]
    paths-ignore:
      - 'backend-laravel/**'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:
    inputs:
      enable_delete:
        description: 'Использовать rsync --delete (удалять на сервере файлы, которых нет в dist/). НЕ включайте на первом прогоне.'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

env:
  DEPLOY_HOST: ssh.gro7659365.nichost.ru
  DEPLOY_USER: gro7659365
  WEB_ROOT: /home/gro7659365/growth-peak.pro/docs

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (vite → dist/)
        run: bun run build

      - name: Sanity check dist/
        run: |
          test -f dist/index.html || { echo "❌ dist/index.html не собран"; exit 1; }
          echo "✅ dist собран, размер:"
          du -sh dist

      - name: Check SSH secret
        run: |
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "::error::DEPLOY_SSH_KEY is not set"
            exit 1
          fi

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust host key (включая ssh-rsa для legacy серверов)
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -t ssh-rsa -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -t rsa,ecdsa,ed25519 -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<EOF
          Host $DEPLOY_HOST
            HostName $DEPLOY_HOST
            User $DEPLOY_USER
            HostKeyAlgorithms +ssh-rsa
            PubkeyAcceptedAlgorithms +ssh-rsa
            PubkeyAcceptedKeyTypes +ssh-rsa
            CASignatureAlgorithms +ssh-rsa
            RequiredRSASize 1024
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy (rsync, backend/ исключён)
        run: |
          DELETE_FLAG=""
          if [ "${{ github.event.inputs.enable_delete }}" = "true" ]; then
            DELETE_FLAG="--delete --delete-excluded"
            echo "⚠️  Режим --delete включён"
          else
            echo "ℹ️  --delete выключен (безопасный режим первого прогона)"
          fi
          rsync -avz \
            -e "ssh -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa -o PubkeyAcceptedKeyTypes=+ssh-rsa -o CASignatureAlgorithms=+ssh-rsa -o RequiredRSASize=1024 -o StrictHostKeyChecking=accept-new" \
            $DELETE_FLAG \
            --exclude 'backend' \
            --exclude 'backend/' \
            --exclude '.htaccess' \
            dist/ "$DEPLOY_USER@$DEPLOY_HOST:$WEB_ROOT/"


      - name: Post-deploy check
        run: |
          echo "✅ Deploy завершён"
          echo "Проверка: https://growth-peak.pro/ (может потребоваться Ctrl+Shift+R)"
