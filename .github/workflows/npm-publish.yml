name: Deploy to server

on:
  push:
    branches: [ main ]

jobs:

  # ─── ФРОНТЕНД ───────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Create frontend .env
        run: |
          echo 'VITE_LARAVEL_API_URL=/api' > .env

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy frontend
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o HostKeyAlgorithms=+ssh-rsa \
              -o PubkeyAcceptedKeyTypes=+ssh-rsa \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
              "mkdir -p ${{ secrets.DEPLOY_PATH }}/frontend"

          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no \
                    -o HostKeyAlgorithms=+ssh-rsa \
                    -o PubkeyAcceptedKeyTypes=+ssh-rsa" \
            dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.DEPLOY_PATH }}/frontend

  # ─── БЭКЕНД ─────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, redis

      - name: Install Composer dependencies
        run: |
          cd backend-laravel
          composer install --no-dev --optimize-autoloader

      - name: Generate APP_KEY
        id: appkey
        run: |
          cd backend-laravel
          echo "key=$(php artisan key:generate --show)" >> $GITHUB_OUTPUT

      - name: Create backend .env
        run: |
          cat > backend-laravel/.env << EOF
          APP_NAME="Career Track API"
          APP_ENV=production
          APP_KEY=${{ steps.appkey.outputs.key }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}
          APP_TIMEZONE=UTC
          APP_LOCALE=ru

          LOG_CHANNEL=stack
          LOG_LEVEL=info

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          CACHE_STORE=file
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=file

          FILESYSTEM_DISK=local

          SANCTUM_STATEFUL_DOMAINS=${{ secrets.APP_URL }}
          SESSION_DOMAIN=${{ secrets.APP_URL }}

          AI_API_URL=https://api.openai.com/v1/chat/completions
          AI_API_KEY=${{ secrets.AI_API_KEY }}
          AI_MODEL=gpt-4o-mini

          FRONTEND_URL=${{ secrets.APP_URL }}
          EOF

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy backend
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o HostKeyAlgorithms=+ssh-rsa \
              -o PubkeyAcceptedKeyTypes=+ssh-rsa \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
              "mkdir -p ${{ secrets.DEPLOY_PATH }}/backend"

          rsync -avz --delete \
            --exclude='.git' \
            --exclude='tests' \
            -e "ssh -o StrictHostKeyChecking=no \
                    -o HostKeyAlgorithms=+ssh-rsa \
                    -o PubkeyAcceptedKeyTypes=+ssh-rsa" \
            backend-laravel/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.DEPLOY_PATH }}/backend

      - name: Migrate & optimize
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o HostKeyAlgorithms=+ssh-rsa \
              -o PubkeyAcceptedKeyTypes=+ssh-rsa \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
              "cd ${{ secrets.DEPLOY_PATH }}/backend && php artisan migrate --force && php artisan config:cache && php artisan route:cache"
