name: Deploy to server

on:
  push:
    branches: [ main ]

jobs:

  # ─── ФРОНТЕНД ───────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create frontend .env
        run: |
          echo 'VITE_LARAVEL_API_URL=/api' > .env

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build frontend
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy frontend to root
        run: |
          rsync -avz --delete \
            --exclude='backend' \
            --exclude='.htaccess' \
            -e "ssh -o StrictHostKeyChecking=no \
                    -o HostKeyAlgorithms=+ssh-rsa \
                    -o PubkeyAcceptedKeyTypes=+ssh-rsa" \
            dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.TARGET_DIR }}/

  # ─── БЭКЕНД ─────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, pdo_mysql, redis

      - name: Downgrade Composer to 2.2 (no advisory block) and clear GitHub token
        run: |
          sudo rm -f /usr/local/bin/composer
          sudo curl -L https://getcomposer.org/download/2.2.22/composer.phar -o /usr/local/bin/composer
          sudo chmod +x /usr/local/bin/composer
          composer --version
          # Remove any invalid GitHub token to avoid "invalid characters" error
          composer config --global --unset github-oauth.github.com || true
          composer config --global --unset http-basic.github.com || true
          # Ensure no auth.json is present
          rm -f ~/.composer/auth.json || true
          rm -f ~/.config/composer/auth.json || true

      - name: Create Laravel project and overlay our files
        run: |
          composer create-project laravel/laravel app-src "^11.0" --prefer-dist --no-interaction
          cd app-src
          composer require laravel/framework:^11.54 --with-all-dependencies --no-interaction
          cd ..
          cp -r backend-laravel/app        app-src/
          cp -r backend-laravel/bootstrap  app-src/
          cp -r backend-laravel/config     app-src/
          cp -r backend-laravel/database   app-src/
          cp -r backend-laravel/routes     app-src/

      - name: Install extra Laravel packages
        run: |
          cd app-src
          composer require \
            laravel/sanctum laravel/socialite \
            spatie/laravel-permission predis/predis \
            guzzlehttp/guzzle --no-interaction

      - name: Create backend .env
        env:
          APP_KEY_SECRET: ${{ secrets.APP_KEY }}
          APP_URL_SECRET: ${{ secrets.APP_URL }}
          DB_CONNECTION_SECRET: ${{ secrets.DB_CONNECTION }}
          DB_HOST_SECRET: ${{ secrets.DB_HOST }}
          DB_PORT_SECRET: ${{ secrets.DB_PORT }}
          DB_DATABASE_SECRET: ${{ secrets.DB_DATABASE }}
          DB_USERNAME_SECRET: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD_SECRET: ${{ secrets.DB_PASSWORD }}
          AI_API_KEY_SECRET: ${{ secrets.AI_API_KEY }}
          GOOGLE_CLIENT_ID_SECRET: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI_SECRET: ${{ secrets.GOOGLE_REDIRECT_URI }}
          MAIL_HOST_SECRET: ${{ secrets.MAIL_HOST }}
          MAIL_PORT_SECRET: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME_SECRET: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD_SECRET: ${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION_SECRET: ${{ secrets.MAIL_ENCRYPTION }}
          MAIL_FROM_ADDRESS_SECRET: ${{ secrets.MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME_SECRET: ${{ secrets.MAIL_FROM_NAME }}
          YANDEX_CLIENT_ID_SECRET: ${{ secrets.YANDEX_CLIENT_ID }}
          YANDEX_CLIENT_SECRET_SECRET: ${{ secrets.YANDEX_CLIENT_SECRET }}
          YANDEX_REDIRECT_URI_SECRET: ${{ secrets.YANDEX_REDIRECT_URI }}
        run: |
          APP_KEY_VALUE="${APP_KEY_SECRET:-__PRESERVE_SERVER_APP_KEY__}"
          APP_CIPHER_VALUE="aes-256-cbc"
          APP_URL_VALUE="$APP_URL_SECRET"
          if [[ "$APP_URL_VALUE" != http://* && "$APP_URL_VALUE" != https://* ]]; then
            APP_URL_VALUE="https://$APP_URL_VALUE"
          fi
          APP_URL_VALUE="${APP_URL_VALUE%/}"

          APP_HOST_VALUE="${APP_URL_VALUE#http://}"
          APP_HOST_VALUE="${APP_HOST_VALUE#https://}"
          APP_HOST_VALUE="${APP_HOST_VALUE%%/*}"

          GOOGLE_REDIRECT_URI_VALUE="$GOOGLE_REDIRECT_URI_SECRET"
          if [[ -z "$GOOGLE_REDIRECT_URI_VALUE" ]]; then
            GOOGLE_REDIRECT_URI_VALUE="$APP_URL_VALUE/api/auth/google/callback"
          elif [[ "$GOOGLE_REDIRECT_URI_VALUE" != http://* && "$GOOGLE_REDIRECT_URI_VALUE" != https://* ]]; then
            GOOGLE_REDIRECT_URI_VALUE="https://$GOOGLE_REDIRECT_URI_VALUE"
          fi
          GOOGLE_REDIRECT_URI_VALUE="${GOOGLE_REDIRECT_URI_VALUE%/}"

          YANDEX_REDIRECT_URI_VALUE="$YANDEX_REDIRECT_URI_SECRET"
          if [[ -z "$YANDEX_REDIRECT_URI_VALUE" ]]; then
            YANDEX_REDIRECT_URI_VALUE="$APP_URL_VALUE/api/auth/yandex/callback"
          elif [[ "$YANDEX_REDIRECT_URI_VALUE" != http://* && "$YANDEX_REDIRECT_URI_VALUE" != https://* ]]; then
            YANDEX_REDIRECT_URI_VALUE="https://$YANDEX_REDIRECT_URI_VALUE"
          fi
          YANDEX_REDIRECT_URI_VALUE="${YANDEX_REDIRECT_URI_VALUE%/}"

          DB_CONNECTION_VALUE="${DB_CONNECTION_SECRET:-mysql}"
          if [[ "$DB_CONNECTION_VALUE" != "mysql" && "$DB_CONNECTION_VALUE" != "pgsql" ]]; then
            DB_CONNECTION_VALUE="mysql"
          fi
          if [[ -n "$DB_PORT_SECRET" && "$DB_CONNECTION_VALUE" == "mysql" && "$DB_PORT_SECRET" == "5432" ]]; then
            DB_PORT_VALUE="3306"
          elif [[ -n "$DB_PORT_SECRET" && "$DB_CONNECTION_VALUE" == "pgsql" && "$DB_PORT_SECRET" == "3306" ]]; then
            DB_PORT_VALUE="5432"
          elif [[ -n "$DB_PORT_SECRET" ]]; then
            DB_PORT_VALUE="$DB_PORT_SECRET"
          elif [[ "$DB_CONNECTION_VALUE" == "pgsql" ]]; then
            DB_PORT_VALUE="5432"
          else
            DB_PORT_VALUE="3306"
          fi
          MAIL_HOST_VALUE="${MAIL_HOST_SECRET}"
          if [[ "$MAIL_HOST_VALUE" == "smtp.yandex.com" ]]; then
            MAIL_HOST_VALUE="smtp.yandex.ru"
          fi
          MAIL_PORT_VALUE="${MAIL_PORT_SECRET:-587}"
          if [[ "$MAIL_HOST_VALUE" == "smtp.yandex.ru" && "$MAIL_PORT_VALUE" == "465" ]]; then
            MAIL_ENCRYPTION_VALUE="ssl"
          elif [[ -n "$MAIL_ENCRYPTION_SECRET" ]]; then
            MAIL_ENCRYPTION_VALUE="$MAIL_ENCRYPTION_SECRET"
          elif [[ "$MAIL_PORT_VALUE" == "465" ]]; then
            MAIL_ENCRYPTION_VALUE="ssl"
          else
            MAIL_ENCRYPTION_VALUE="tls"
          fi
          MAIL_FROM_ADDRESS_VALUE="${MAIL_FROM_ADDRESS_SECRET:-noreply@${APP_HOST_VALUE}}"
          MAIL_FROM_NAME_VALUE="${MAIL_FROM_NAME_SECRET:-Пик Роста}"
          export APP_KEY_VALUE APP_CIPHER_VALUE APP_URL_VALUE APP_HOST_VALUE GOOGLE_REDIRECT_URI_VALUE \
            YANDEX_REDIRECT_URI_VALUE \
            DB_CONNECTION_VALUE DB_PORT_VALUE MAIL_HOST_VALUE MAIL_PORT_VALUE \
            MAIL_ENCRYPTION_VALUE MAIL_FROM_ADDRESS_VALUE MAIL_FROM_NAME_VALUE

          python3 <<'PY'
          import os
          from pathlib import Path

          def env_quote(value):
              value = '' if value is None else str(value)
              return '"' + value.replace('\\', '\\\\').replace('"', '\\"').replace('\n', '\\n') + '"'

          keys = {
              'APP_NAME': 'Пик Роста',
              'APP_ENV': 'production',
              'APP_KEY': os.environ['APP_KEY_VALUE'],
              'APP_CIPHER': os.environ['APP_CIPHER_VALUE'],
              'APP_DEBUG': 'false',
              'APP_URL': os.environ['APP_URL_VALUE'],
              'APP_TIMEZONE': 'UTC',
              'APP_LOCALE': 'ru',
              'LOG_CHANNEL': 'stack',
              'LOG_LEVEL': 'info',
              'DB_CONNECTION': os.environ['DB_CONNECTION_VALUE'],
              'DB_HOST': os.environ.get('DB_HOST_SECRET', ''),
              'DB_PORT': os.environ['DB_PORT_VALUE'],
              'DB_DATABASE': os.environ.get('DB_DATABASE_SECRET', ''),
              'DB_USERNAME': os.environ.get('DB_USERNAME_SECRET', ''),
              'DB_PASSWORD': os.environ.get('DB_PASSWORD_SECRET', ''),
              'CACHE_STORE': 'file',
              'QUEUE_CONNECTION': 'sync',
              'SESSION_DRIVER': 'file',
              'FILESYSTEM_DISK': 'local',
              'SANCTUM_STATEFUL_DOMAINS': f"{os.environ['APP_HOST_VALUE']},www.{os.environ['APP_HOST_VALUE']},localhost:8080",
              'SESSION_DOMAIN': f".{os.environ['APP_HOST_VALUE']}",
              'AI_API_URL': 'https://api.openai.com/v1/chat/completions',
              'AI_API_KEY': os.environ.get('AI_API_KEY_SECRET', ''),
              'AI_MODEL': 'gpt-4o-mini',
              'GOOGLE_CLIENT_ID': os.environ.get('GOOGLE_CLIENT_ID_SECRET', ''),
              'GOOGLE_CLIENT_SECRET': os.environ.get('GOOGLE_CLIENT_SECRET_SECRET', ''),
              'GOOGLE_REDIRECT_URI': os.environ['GOOGLE_REDIRECT_URI_VALUE'],
              'FRONTEND_URL': os.environ['APP_URL_VALUE'],
              'APP_FRONTEND_URL': os.environ['APP_URL_VALUE'],
              'MAIL_MAILER': 'smtp',
              'MAIL_HOST': os.environ['MAIL_HOST_VALUE'],
              'MAIL_PORT': os.environ['MAIL_PORT_VALUE'],
              'MAIL_USERNAME': os.environ.get('MAIL_USERNAME_SECRET', ''),
              'MAIL_PASSWORD': os.environ.get('MAIL_PASSWORD_SECRET', ''),
              'MAIL_ENCRYPTION': os.environ['MAIL_ENCRYPTION_VALUE'],
              'MAIL_FROM_ADDRESS': os.environ['MAIL_FROM_ADDRESS_VALUE'],
              'MAIL_FROM_NAME': os.environ['MAIL_FROM_NAME_VALUE'],
          }

          Path('app-src/.env').write_text('\n'.join(f'{k}={env_quote(v)}' for k, v in keys.items()) + '\n')
          PY

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy backend
        run: |
          APP_KEY_VALUE="$(awk -F= '/^APP_KEY=/{sub(/^APP_KEY=/,""); gsub(/^"|"$/,""); print; exit}' app-src/.env)"

          if [[ "$APP_KEY_VALUE" == "__PRESERVE_SERVER_APP_KEY__" ]]; then
            SERVER_APP_KEY="$(ssh -o StrictHostKeyChecking=no \
                -o HostKeyAlgorithms=+ssh-rsa \
                -o PubkeyAcceptedKeyTypes=+ssh-rsa \
                ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
                "if [ -f ${{ secrets.TARGET_DIR }}/backend/.env ]; then awk '/^APP_KEY=/{sub(/^APP_KEY=/,\"\"); gsub(/^\\\"|\\\"$/,\"\"); print; exit}' ${{ secrets.TARGET_DIR }}/backend/.env; fi")"
            if [[ -z "$SERVER_APP_KEY" ]]; then
              echo "::error::APP_KEY GitHub secret is missing and no existing server APP_KEY was found. Set the APP_KEY GitHub secret (base64:... format)."
              exit 1
            fi
            APP_KEY_VALUE="$SERVER_APP_KEY"
            export APP_KEY_VALUE
            python3 -c "from pathlib import Path; import os; p=Path('app-src/.env'); p.write_text(p.read_text().replace('__PRESERVE_SERVER_APP_KEY__', os.environ['APP_KEY_VALUE']))"
          fi

          export APP_KEY_VALUE="${APP_KEY_VALUE:-}"

          python3 - <<'PY'
          import os, base64, sys
          key = os.environ.get('APP_KEY_VALUE', '')
          if not key:
              sys.stderr.write('APP_KEY невалиден или отсутствует — задайте GitHub secret APP_KEY в формате base64:... (php artisan key:generate --show)\n')
              sys.exit(1)
          if key.startswith('base64:'):
              try:
                  raw = base64.b64decode(key[7:], validate=True)
              except Exception as exc:
                  sys.stderr.write(f'APP_KEY невалиден (base64 decode failed: {exc}) — задайте GitHub secret APP_KEY в формате base64:...\n')
                  sys.exit(1)
          else:
              raw = key.encode('utf-8')
          if len(raw) not in (16, 32):
              sys.stderr.write(f'APP_KEY должен декодироваться в 16 или 32 байта, получено {len(raw)}. Задайте GitHub secret APP_KEY в формате base64:... (php artisan key:generate --show)\n')
              sys.exit(1)
          PY

          ssh -o StrictHostKeyChecking=no \
              -o HostKeyAlgorithms=+ssh-rsa \
              -o PubkeyAcceptedKeyTypes=+ssh-rsa \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
              "mkdir -p ${{ secrets.TARGET_DIR }}/backend"

          rsync -avz --delete \
            --exclude='.git' \
            --exclude='tests' \
            --exclude='storage/app/public' \
            --exclude='storage/logs' \
            -e "ssh -o StrictHostKeyChecking=no \
                    -o HostKeyAlgorithms=+ssh-rsa \
                    -o PubkeyAcceptedKeyTypes=+ssh-rsa" \
            app-src/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.TARGET_DIR }}/backend

      - name: Setup on server
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o HostKeyAlgorithms=+ssh-rsa \
              -o PubkeyAcceptedKeyTypes=+ssh-rsa \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
              "cd ${{ secrets.TARGET_DIR }}/backend \
              && mkdir -p storage/logs storage/app/public storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache \
              && chmod -R 777 storage bootstrap/cache \
              && php artisan optimize:clear \
              && php artisan config:clear \
              && php artisan migrate --force \
              && php artisan db:seed --class=RoleSeeder --force \
              && php artisan config:cache \
              && php artisan route:cache"
