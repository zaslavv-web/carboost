name: Deploy to server

on:
  push:
    branches: [ main ]

jobs:

  # ─── ФРОНТЕНД ───────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Create frontend .env
        run: |
          echo 'VITE_LARAVEL_API_URL=/api' > .env

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build frontend
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy frontend to root
        run: |
          rsync -avz --delete \
            --exclude='backend' \
            --exclude='.htaccess' \
            -e "ssh -o StrictHostKeyChecking=no \
                    -o HostKeyAlgorithms=+ssh-rsa \
                    -o PubkeyAcceptedKeyTypes=+ssh-rsa" \
            dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.TARGET_DIR }}/

  # ─── БЭКЕНД ─────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, pdo_mysql, redis

      - name: Downgrade Composer to 2.2 (no advisory block) and clear GitHub token
        run: |
          sudo rm -f /usr/local/bin/composer
          sudo curl -L https://getcomposer.org/download/2.2.22/composer.phar -o /usr/local/bin/composer
          sudo chmod +x /usr/local/bin/composer
          composer --version
          # Remove any invalid GitHub token to avoid "invalid characters" error
          composer config --global --unset github-oauth.github.com || true
          composer config --global --unset http-basic.github.com || true
          # Ensure no auth.json is present
          rm -f ~/.composer/auth.json || true
          rm -f ~/.config/composer/auth.json || true

      - name: Create Laravel project and overlay our files
        run: |
          composer create-project laravel/laravel app-src "^11.0" --prefer-dist --no-interaction
          cd app-src
          composer require laravel/framework:^11.54 --with-all-dependencies --no-interaction
          cd ..
          cp -r backend-laravel/app        app-src/
          cp -r backend-laravel/bootstrap  app-src/
          cp -r backend-laravel/config     app-src/
          cp -r backend-laravel/database   app-src/
          cp -r backend-laravel/routes     app-src/

      - name: Install extra Laravel packages
        run: |
          cd app-src
          composer require \
            laravel/sanctum laravel/socialite \
            spatie/laravel-permission predis/predis \
            guzzlehttp/guzzle --no-interaction

      - name: Create backend .env
        env:
          APP_KEY_SECRET: ${{ secrets.APP_KEY }}
          APP_URL_SECRET: ${{ secrets.APP_URL }}
          DB_CONNECTION_SECRET: ${{ secrets.DB_CONNECTION }}
          DB_HOST_SECRET: ${{ secrets.DB_HOST }}
          DB_PORT_SECRET: ${{ secrets.DB_PORT }}
          DB_DATABASE_SECRET: ${{ secrets.DB_DATABASE }}
          DB_USERNAME_SECRET: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD_SECRET: ${{ secrets.DB_PASSWORD }}
          AI_API_KEY_SECRET: ${{ secrets.AI_API_KEY }}
          GOOGLE_CLIENT_ID_SECRET: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI_SECRET: ${{ secrets.GOOGLE_REDIRECT_URI }}
          MAIL_MAILER_SECRET: ${{ secrets.MAIL_MAILER }}
          MAIL_MAILER_VAR: ${{ vars.MAIL_MAILER }}
          MAIL_HOST_SECRET: ${{ secrets.MAIL_HOST }}
          MAIL_PORT_SECRET: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME_SECRET: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD_SECRET: ${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION_SECRET: ${{ secrets.MAIL_ENCRYPTION }}
          MAIL_FROM_ADDRESS_SECRET: ${{ secrets.MAIL_FROM_ADDRESS }}
          MAIL_FROM_ADDRESS_VAR: ${{ vars.MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME_SECRET: ${{ secrets.MAIL_FROM_NAME }}
          MAIL_FROM_NAME_VAR: ${{ vars.MAIL_FROM_NAME }}
          UNISENDER_GO_API_KEY_SECRET: ${{ secrets.UNISENDER_GO_API_KEY }}
          UNISENDER_GO_ENDPOINT_SECRET: ${{ secrets.UNISENDER_GO_ENDPOINT }}
          UNISENDER_GO_ENDPOINT_VAR: ${{ vars.UNISENDER_GO_ENDPOINT }}
          UNISENDER_GO_TIMEOUT_SECRET: ${{ secrets.UNISENDER_GO_TIMEOUT }}
          UNISENDER_GO_TIMEOUT_VAR: ${{ vars.UNISENDER_GO_TIMEOUT }}
          YANDEX_CLIENT_ID_SECRET: ${{ secrets.YANDEX_CLIENT_ID }}
          YANDEX_CLIENT_SECRET_SECRET: ${{ secrets.YANDEX_CLIENT_SECRET }}
          YANDEX_REDIRECT_URI_SECRET: ${{ secrets.YANDEX_REDIRECT_URI }}
          GEOIP_PROVIDER_SECRET: ${{ secrets.GEOIP_PROVIDER }}
        run: |
          APP_KEY_VALUE="${APP_KEY_SECRET:-__PRESERVE_SERVER_APP_KEY__}"
          APP_CIPHER_VALUE="aes-256-cbc"
          APP_URL_VALUE="$APP_URL_SECRET"
          if [[ "$APP_URL_VALUE" != http://* && "$APP_URL_VALUE" != https://* ]]; then
            APP_URL_VALUE="https://$APP_URL_VALUE"
          fi
          APP_URL_VALUE="${APP_URL_VALUE%/}"

          APP_HOST_VALUE="${APP_URL_VALUE#http://}"
          APP_HOST_VALUE="${APP_HOST_VALUE#https://}"
          APP_HOST_VALUE="${APP_HOST_VALUE%%/*}"

          GOOGLE_REDIRECT_URI_VALUE="$GOOGLE_REDIRECT_URI_SECRET"
          if [[ -z "$GOOGLE_REDIRECT_URI_VALUE" ]]; then
            GOOGLE_REDIRECT_URI_VALUE="$APP_URL_VALUE/api/auth/google/callback"
          elif [[ "$GOOGLE_REDIRECT_URI_VALUE" != http://* && "$GOOGLE_REDIRECT_URI_VALUE" != https://* ]]; then
            GOOGLE_REDIRECT_URI_VALUE="https://$GOOGLE_REDIRECT_URI_VALUE"
          fi
          GOOGLE_REDIRECT_URI_VALUE="${GOOGLE_REDIRECT_URI_VALUE%/}"

          YANDEX_REDIRECT_URI_VALUE="$YANDEX_REDIRECT_URI_SECRET"
          if [[ -z "$YANDEX_REDIRECT_URI_VALUE" ]]; then
            YANDEX_REDIRECT_URI_VALUE="$APP_URL_VALUE/api/auth/yandex/callback"
          elif [[ "$YANDEX_REDIRECT_URI_VALUE" != http://* && "$YANDEX_REDIRECT_URI_VALUE" != https://* ]]; then
            YANDEX_REDIRECT_URI_VALUE="https://$YANDEX_REDIRECT_URI_VALUE"
          fi
          YANDEX_REDIRECT_URI_VALUE="${YANDEX_REDIRECT_URI_VALUE%/}"

          DB_CONNECTION_VALUE="${DB_CONNECTION_SECRET:-__PRESERVE_SERVER_DB_CONNECTION__}"
          if [[ "$DB_CONNECTION_VALUE" != "__PRESERVE_SERVER_DB_CONNECTION__" \
                && "$DB_CONNECTION_VALUE" != "mysql" \
                && "$DB_CONNECTION_VALUE" != "pgsql" ]]; then
            DB_CONNECTION_VALUE="mysql"
          fi
          if [[ -n "$DB_PORT_SECRET" ]]; then
            DB_PORT_VALUE="$DB_PORT_SECRET"
            if [[ "$DB_CONNECTION_VALUE" == "mysql" && "$DB_PORT_VALUE" == "5432" ]]; then
              DB_PORT_VALUE="3306"
            elif [[ "$DB_CONNECTION_VALUE" == "pgsql" && "$DB_PORT_VALUE" == "3306" ]]; then
              DB_PORT_VALUE="5432"
            fi
          else
            DB_PORT_VALUE="__PRESERVE_SERVER_DB_PORT__"
          fi
          DB_HOST_VALUE="${DB_HOST_SECRET:-__PRESERVE_SERVER_DB_HOST__}"
          DB_DATABASE_VALUE="${DB_DATABASE_SECRET:-__PRESERVE_SERVER_DB_DATABASE__}"
          DB_USERNAME_VALUE="${DB_USERNAME_SECRET:-__PRESERVE_SERVER_DB_USERNAME__}"
          DB_PASSWORD_VALUE="${DB_PASSWORD_SECRET:-__PRESERVE_SERVER_DB_PASSWORD__}"

          MAIL_MAILER_VALUE="${MAIL_MAILER_SECRET:-${MAIL_MAILER_VAR:-__PRESERVE_SERVER_MAIL_MAILER__}}"
          MAIL_HOST_VALUE="${MAIL_HOST_SECRET:-__PRESERVE_SERVER_MAIL_HOST__}"
          if [[ "$MAIL_HOST_VALUE" == "smtp.yandex.com" ]]; then
            MAIL_HOST_VALUE="smtp.yandex.ru"
          fi
          MAIL_PORT_VALUE="${MAIL_PORT_SECRET:-__PRESERVE_SERVER_MAIL_PORT__}"
          if [[ "$MAIL_HOST_VALUE" == "smtp.yandex.ru" && "$MAIL_PORT_VALUE" == "465" ]]; then
            MAIL_ENCRYPTION_VALUE="ssl"
          elif [[ -n "$MAIL_ENCRYPTION_SECRET" ]]; then
            MAIL_ENCRYPTION_VALUE="$MAIL_ENCRYPTION_SECRET"
          elif [[ "$MAIL_PORT_VALUE" == "465" ]]; then
            MAIL_ENCRYPTION_VALUE="ssl"
          else
            MAIL_ENCRYPTION_VALUE="__PRESERVE_SERVER_MAIL_ENCRYPTION__"
          fi
          MAIL_USERNAME_VALUE="${MAIL_USERNAME_SECRET:-__PRESERVE_SERVER_MAIL_USERNAME__}"
          MAIL_PASSWORD_VALUE="${MAIL_PASSWORD_SECRET:-__PRESERVE_SERVER_MAIL_PASSWORD__}"
          MAIL_FROM_ADDRESS_VALUE="${MAIL_FROM_ADDRESS_SECRET:-${MAIL_FROM_ADDRESS_VAR:-__PRESERVE_SERVER_MAIL_FROM_ADDRESS__}}"
          MAIL_FROM_NAME_VALUE="${MAIL_FROM_NAME_SECRET:-${MAIL_FROM_NAME_VAR:-__PRESERVE_SERVER_MAIL_FROM_NAME__}}"
          UNISENDER_GO_API_KEY_VALUE="${UNISENDER_GO_API_KEY_SECRET:-__PRESERVE_SERVER_UNISENDER_GO_API_KEY__}"
          UNISENDER_GO_ENDPOINT_VALUE="${UNISENDER_GO_ENDPOINT_SECRET:-${UNISENDER_GO_ENDPOINT_VAR:-__PRESERVE_SERVER_UNISENDER_GO_ENDPOINT__}}"
          UNISENDER_GO_TIMEOUT_VALUE="${UNISENDER_GO_TIMEOUT_SECRET:-${UNISENDER_GO_TIMEOUT_VAR:-__PRESERVE_SERVER_UNISENDER_GO_TIMEOUT__}}"
          GEOIP_PROVIDER_VALUE="${GEOIP_PROVIDER_SECRET:-ip-api}"
          export APP_KEY_VALUE APP_CIPHER_VALUE APP_URL_VALUE APP_HOST_VALUE GOOGLE_REDIRECT_URI_VALUE \
            YANDEX_REDIRECT_URI_VALUE GEOIP_PROVIDER_VALUE \
            DB_CONNECTION_VALUE DB_HOST_VALUE DB_PORT_VALUE DB_DATABASE_VALUE \
            DB_USERNAME_VALUE DB_PASSWORD_VALUE \
            MAIL_HOST_VALUE MAIL_PORT_VALUE \
            MAIL_MAILER_VALUE MAIL_USERNAME_VALUE MAIL_PASSWORD_VALUE MAIL_ENCRYPTION_VALUE \
            MAIL_FROM_ADDRESS_VALUE MAIL_FROM_NAME_VALUE UNISENDER_GO_API_KEY_VALUE \
            UNISENDER_GO_ENDPOINT_VALUE UNISENDER_GO_TIMEOUT_VALUE


          python3 <<'PY'
          import os
          from pathlib import Path

          def env_quote(value):
              value = '' if value is None else str(value)
              return '"' + value.replace('\\', '\\\\').replace('"', '\\"').replace('\n', '\\n') + '"'

          keys = {
              'APP_NAME': 'Пик Роста',
              'APP_ENV': 'production',
              'APP_KEY': os.environ['APP_KEY_VALUE'],
              'APP_CIPHER': os.environ['APP_CIPHER_VALUE'],
              'APP_DEBUG': 'false',
              'APP_URL': os.environ['APP_URL_VALUE'],
              'APP_TIMEZONE': 'UTC',
              'APP_LOCALE': 'ru',
              'LOG_CHANNEL': 'stack',
              'LOG_LEVEL': 'info',
              'DB_CONNECTION': os.environ['DB_CONNECTION_VALUE'],
              'DB_HOST': os.environ['DB_HOST_VALUE'],
              'DB_PORT': os.environ['DB_PORT_VALUE'],
              'DB_DATABASE': os.environ['DB_DATABASE_VALUE'],
              'DB_USERNAME': os.environ['DB_USERNAME_VALUE'],
              'DB_PASSWORD': os.environ['DB_PASSWORD_VALUE'],

              'CACHE_STORE': 'file',
              'QUEUE_CONNECTION': 'sync',
              'SESSION_DRIVER': 'file',
              'FILESYSTEM_DISK': 'local',
              'SANCTUM_STATEFUL_DOMAINS': f"{os.environ['APP_HOST_VALUE']},www.{os.environ['APP_HOST_VALUE']},localhost:8080",
              'SESSION_DOMAIN': f".{os.environ['APP_HOST_VALUE']}",
              'AI_API_URL': 'https://api.openai.com/v1/chat/completions',
              'AI_API_KEY': os.environ.get('AI_API_KEY_SECRET', ''),
              'AI_MODEL': 'gpt-4o-mini',
              'GOOGLE_CLIENT_ID': os.environ.get('GOOGLE_CLIENT_ID_SECRET', ''),
              'GOOGLE_CLIENT_SECRET': os.environ.get('GOOGLE_CLIENT_SECRET_SECRET', ''),
              'GOOGLE_REDIRECT_URI': os.environ['GOOGLE_REDIRECT_URI_VALUE'],
              'YANDEX_CLIENT_ID': os.environ.get('YANDEX_CLIENT_ID_SECRET', ''),
              'YANDEX_CLIENT_SECRET': os.environ.get('YANDEX_CLIENT_SECRET_SECRET', ''),
              'YANDEX_REDIRECT_URI': os.environ['YANDEX_REDIRECT_URI_VALUE'],
              'FRONTEND_URL': os.environ['APP_URL_VALUE'],
              'APP_FRONTEND_URL': os.environ['APP_URL_VALUE'],
              'MAIL_MAILER': os.environ['MAIL_MAILER_VALUE'],
              'MAIL_HOST': os.environ['MAIL_HOST_VALUE'],
              'MAIL_PORT': os.environ['MAIL_PORT_VALUE'],
              'MAIL_USERNAME': os.environ['MAIL_USERNAME_VALUE'],
              'MAIL_PASSWORD': os.environ['MAIL_PASSWORD_VALUE'],
              'MAIL_ENCRYPTION': os.environ['MAIL_ENCRYPTION_VALUE'],
              'MAIL_FROM_ADDRESS': os.environ['MAIL_FROM_ADDRESS_VALUE'],
              'MAIL_FROM_NAME': os.environ['MAIL_FROM_NAME_VALUE'],
              'UNISENDER_GO_API_KEY': os.environ['UNISENDER_GO_API_KEY_VALUE'],
              'UNISENDER_GO_ENDPOINT': os.environ['UNISENDER_GO_ENDPOINT_VALUE'],
              'UNISENDER_GO_TIMEOUT': os.environ['UNISENDER_GO_TIMEOUT_VALUE'],
              'GEOIP_PROVIDER': os.environ['GEOIP_PROVIDER_VALUE'],
              'GEOIP_DISABLED': '0',
          }

          Path('app-src/.env').write_text('\n'.join(f'{k}={env_quote(v)}' for k, v in keys.items()) + '\n')
          PY

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy backend
        run: |
          APP_KEY_VALUE="$(awk -F= '/^APP_KEY=/{sub(/^APP_KEY=/,""); gsub(/^"|"$/,""); print; exit}' app-src/.env)"

          if [[ "$APP_KEY_VALUE" == "__PRESERVE_SERVER_APP_KEY__" ]]; then
            SERVER_APP_KEY="$(ssh -o StrictHostKeyChecking=no \
                -o HostKeyAlgorithms=+ssh-rsa \
                -o PubkeyAcceptedKeyTypes=+ssh-rsa \
                ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
                "if [ -f ${{ secrets.TARGET_DIR }}/backend/.env ]; then awk '/^APP_KEY=/{sub(/^APP_KEY=/,\"\"); gsub(/^\\\"|\\\"$/,\"\"); print; exit}' ${{ secrets.TARGET_DIR }}/backend/.env; fi")"
            if [[ -z "$SERVER_APP_KEY" ]]; then
              echo "::error::APP_KEY GitHub secret is missing and no existing server APP_KEY was found. Set the APP_KEY GitHub secret (base64:... format)."
              exit 1
            fi
            APP_KEY_VALUE="$SERVER_APP_KEY"
            export APP_KEY_VALUE
            python3 -c "from pathlib import Path; import os; p=Path('app-src/.env'); p.write_text(p.read_text().replace('__PRESERVE_SERVER_APP_KEY__', os.environ['APP_KEY_VALUE']))"
          fi

          SERVER_MAIL_ENV="$(ssh -o StrictHostKeyChecking=no \
              -o HostKeyAlgorithms=+ssh-rsa \
              -o PubkeyAcceptedKeyTypes=+ssh-rsa \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
              "if [ -f ${{ secrets.TARGET_DIR }}/backend/.env ]; then grep -E '^(DB_CONNECTION|DB_HOST|DB_PORT|DB_DATABASE|DB_USERNAME|DB_PASSWORD|MAIL_MAILER|MAIL_HOST|MAIL_PORT|MAIL_USERNAME|MAIL_PASSWORD|MAIL_ENCRYPTION|MAIL_FROM_ADDRESS|MAIL_FROM_NAME|UNISENDER_GO_API_KEY|UNISENDER_GO_ENDPOINT|UNISENDER_GO_TIMEOUT)=' ${{ secrets.TARGET_DIR }}/backend/.env || true; fi")"
          export SERVER_MAIL_ENV
          python3 - <<'PY'
          import os
          from pathlib import Path

          def parse_env_value(raw):
              value = raw.strip()
              if len(value) >= 2 and value[0] == value[-1] == '"':
                  value = value[1:-1]
                  value = value.replace('\\n', '\n').replace('\\"', '"').replace('\\\\', '\\')
              return value

          def parse_env_lines(text):
              parsed = {}
              for line in text.splitlines():
                  if '=' not in line or line.lstrip().startswith('#'):
                      continue
                  key, value = line.split('=', 1)
                  parsed[key.strip()] = parse_env_value(value)
              return parsed

          server = {}
          for line in os.environ.get('SERVER_MAIL_ENV', '').splitlines():
              if '=' not in line or line.lstrip().startswith('#'):
                  continue
              key, value = line.split('=', 1)
              server[key.strip()] = parse_env_value(value)

          defaults = {
              'DB_CONNECTION': 'mysql',
              'DB_HOST': 'localhost',
              'DB_PORT': '3306',
              'DB_DATABASE': '',
              'DB_USERNAME': '',
              'DB_PASSWORD': '',
              'MAIL_MAILER': 'unisender_go',
              'MAIL_HOST': 'localhost',
              'MAIL_PORT': '587',
              'MAIL_USERNAME': '',
              'MAIL_PASSWORD': '',
              'MAIL_ENCRYPTION': '',
              'MAIL_FROM_ADDRESS': 'noreply@mail.growth-peak.pro',
              'MAIL_FROM_NAME': 'Growth Peak',
              'UNISENDER_GO_API_KEY': '',
              'UNISENDER_GO_ENDPOINT': 'https://go2.unisender.ru/ru/transactional/api/v1/email/send.json',
              'UNISENDER_GO_TIMEOUT': '15',
          }
          # Ключи, для которых пустое значение на сервере — валидное (например, MAIL_ENCRYPTION="").
          allow_empty_from_server = {'MAIL_USERNAME', 'MAIL_PASSWORD', 'MAIL_ENCRYPTION', 'DB_PASSWORD'}
          # Критичные ключи — без значения деплой должен падать, а не идти с пустой строкой.
          required_keys = {'DB_DATABASE', 'DB_USERNAME'}

          path = Path('app-src/.env')
          content = path.read_text()
          generated = parse_env_lines(content)

          final_mail = {}
          for key, default in defaults.items():
              generated_value = generated.get(key, '')
              if generated_value.startswith('__PRESERVE_SERVER_'):
                  generated_value = ''

              if key in server:
                  server_value = server[key]
                  if server_value or key in allow_empty_from_server:
                      final_mail[key] = server_value
                      continue

              final_mail[key] = generated_value or default

          missing = [k for k in required_keys if not final_mail.get(k)]
          if missing:
              raise SystemExit(
                  'Не удалось определить значения для ' + ', '.join(missing) +
                  ': задайте соответствующие GitHub Secrets или пропишите их в backend/.env на сервере.'
              )


          # Почтовые настройки на VPS имеют приоритет: деплой не должен
          # откатывать рабочий .env к устаревшим GitHub Secrets.
          placeholders = {
              f'__PRESERVE_SERVER_{key}__': value
              for key, value in final_mail.items()
          }
          for placeholder, value in placeholders.items():
              escaped = value.replace('\\', '\\\\').replace('"', '\\"').replace('\n', '\\n')
              content = content.replace(placeholder, escaped)

          lines = []
          for line in content.splitlines():
              if '=' not in line or line.lstrip().startswith('#'):
                  lines.append(line)
                  continue
              key = line.split('=', 1)[0].strip()
              if key in final_mail:
                  escaped = final_mail[key].replace('\\', '\\\\').replace('"', '\\"').replace('\n', '\\n')
                  lines.append(f'{key}="{escaped}"')
              else:
                  lines.append(line)
          content = '\n'.join(lines) + '\n'
          path.write_text(content)
          PY

          export APP_KEY_VALUE="${APP_KEY_VALUE:-}"

          python3 - <<'PY'
          import os, base64, sys
          key = os.environ.get('APP_KEY_VALUE', '')
          if not key:
              sys.stderr.write('APP_KEY невалиден или отсутствует — задайте GitHub secret APP_KEY в формате base64:... (php artisan key:generate --show)\n')
              sys.exit(1)
          if key.startswith('base64:'):
              try:
                  raw = base64.b64decode(key[7:], validate=True)
              except Exception as exc:
                  sys.stderr.write(f'APP_KEY невалиден (base64 decode failed: {exc}) — задайте GitHub secret APP_KEY в формате base64:...\n')
                  sys.exit(1)
          else:
              raw = key.encode('utf-8')
          if len(raw) not in (16, 32):
              sys.stderr.write(f'APP_KEY должен декодироваться в 16 или 32 байта, получено {len(raw)}. Задайте GitHub secret APP_KEY в формате base64:... (php artisan key:generate --show)\n')
              sys.exit(1)
          PY

          ssh -o StrictHostKeyChecking=no \
              -o HostKeyAlgorithms=+ssh-rsa \
              -o PubkeyAcceptedKeyTypes=+ssh-rsa \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
              "mkdir -p ${{ secrets.TARGET_DIR }}/backend"

          rsync -avz --delete \
            --exclude='.git' \
            --exclude='tests' \
            --exclude='storage/app/public' \
            --exclude='storage/logs' \
            -e "ssh -o StrictHostKeyChecking=no \
                    -o HostKeyAlgorithms=+ssh-rsa \
                    -o PubkeyAcceptedKeyTypes=+ssh-rsa" \
            app-src/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.TARGET_DIR }}/backend

      - name: Setup on server
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o HostKeyAlgorithms=+ssh-rsa \
              -o PubkeyAcceptedKeyTypes=+ssh-rsa \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
              "cd ${{ secrets.TARGET_DIR }}/backend \
              && mkdir -p storage/logs storage/app/public storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache \
              && chmod -R 777 storage bootstrap/cache \
              && php artisan optimize:clear \
              && php artisan config:clear \
              && php -r '
              require __DIR__."/vendor/autoload.php";
              Dotenv\Dotenv::createImmutable(__DIR__)->safeLoad();
              $host = $_ENV["DB_HOST"] ?? "localhost";
              $port = $_ENV["DB_PORT"] ?? "3306";
              $db = $_ENV["DB_DATABASE"] ?? "";
              $user = $_ENV["DB_USERNAME"] ?? "";
              $password = $_ENV["DB_PASSWORD"] ?? "";
              echo "DB preflight: host={$host}, port={$port}, database={$db}, user={$user}\n";
              if ($db === "" || $user === "") {
                  fwrite(STDERR, "DB preflight failed: DB_DATABASE or DB_USERNAME is empty in backend/.env\n");
                  exit(1);
              }
              try {
                  new PDO("mysql:host={$host};port={$port};dbname={$db};charset=utf8mb4", $user, $password, [PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION]);
                  echo "DB preflight: OK\n";
              } catch (Throwable $e) {
                  fwrite(STDERR, "DB preflight failed: MySQL rejected credentials or database privileges. Check DB_DATABASE/DB_USERNAME/DB_PASSWORD in backend/.env and Beget database user binding.\n");
                  exit(1);
              }
              ' \
              && php artisan migrate --force \
              && php artisan db:seed --class=RoleSeeder --force \
              && php artisan config:cache \
              && php artisan route:cache"
