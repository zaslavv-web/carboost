name: Deploy to server

on:
  push:
    branches: [ main ]

jobs:

  # ─── ФРОНТЕНД ───────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Create frontend .env
        run: |
          echo 'VITE_LARAVEL_API_URL=/api' > .env

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy frontend
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o HostKeyAlgorithms=+ssh-rsa \
              -o PubkeyAcceptedKeyTypes=+ssh-rsa \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
              "mkdir -p ${{ secrets.TARGET_DIR }}/frontend"

          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no \
                    -o HostKeyAlgorithms=+ssh-rsa \
                    -o PubkeyAcceptedKeyTypes=+ssh-rsa" \
            dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.TARGET_DIR }}/frontend

  # ─── БЭКЕНД ─────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, redis

      - name: Create Laravel project and overlay our files
        run: |
          composer create-project laravel/laravel app-src "11.*" --prefer-dist --no-interaction
          cp -r backend-laravel/app        app-src/
          cp -r backend-laravel/bootstrap  app-src/
          cp -r backend-laravel/config     app-src/
          cp -r backend-laravel/database   app-src/
          cp -r backend-laravel/routes     app-src/

      - name: Install extra Laravel packages
        run: |
          cd app-src
          composer require \
            laravel/sanctum laravel/socialite \
            spatie/laravel-permission predis/predis \
            guzzlehttp/guzzle --no-interaction

      - name: Create storage directories
        run: |
          mkdir -p app-src/storage/logs
          mkdir -p app-src/storage/app/public
          mkdir -p app-src/storage/framework/cache
          mkdir -p app-src/storage/framework/sessions
          mkdir -p app-src/storage/framework/views
          mkdir -p app-src/bootstrap/cache
          chmod -R 775 app-src/storage
          chmod -R 775 app-src/bootstrap/cache

      - name: Generate APP_KEY
        id: appkey
        run: |
          cd app-src
          echo "key=$(php artisan key:generate --show)" >> $GITHUB_OUTPUT

      - name: Create backend .env
        run: |
          cat > app-src/.env << EOF
          APP_NAME="Career Track API"
          APP_ENV=production
          APP_KEY=${{ steps.appkey.outputs.key }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}
          APP_TIMEZONE=UTC
          APP_LOCALE=ru

          LOG_CHANNEL=stack
          LOG_LEVEL=info

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          CACHE_STORE=file
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=file

          FILESYSTEM_DISK=local

          SANCTUM_STATEFUL_DOMAINS=${{ secrets.APP_URL }}
          SESSION_DOMAIN=${{ secrets.APP_URL }}

          AI_API_URL=https://api.openai.com/v1/chat/completions
          AI_API_KEY=${{ secrets.AI_API_KEY }}
          AI_MODEL=gpt-4o-mini

          FRONTEND_URL=${{ secrets.APP_URL }}
          EOF

      - name: Optimize
        run: |
          cd app-src
          php artisan config:cache
          php artisan route:cache

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy backend
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o HostKeyAlgorithms=+ssh-rsa \
              -o PubkeyAcceptedKeyTypes=+ssh-rsa \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
              "mkdir -p ${{ secrets.TARGET_DIR }}/backend"

          rsync -avz --delete \
            --exclude='.git' \
            --exclude='tests' \
            --exclude='storage/app/public' \
            --exclude='storage/logs' \
            -e "ssh -o StrictHostKeyChecking=no \
                    -o HostKeyAlgorithms=+ssh-rsa \
                    -o PubkeyAcceptedKeyTypes=+ssh-rsa" \
            app-src/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.TARGET_DIR }}/backend

      - name: Migrate on server
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o HostKeyAlgorithms=+ssh-rsa \
              -o PubkeyAcceptedKeyTypes=+ssh-rsa \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
              "cd ${{ secrets.TARGET_DIR }}/backend && php artisan migrate --force && php artisan db:seed --class=RoleSeeder --force"
