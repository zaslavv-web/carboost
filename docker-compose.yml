# Production deployment for the Career Track frontend.
# Бэкенд — Laravel + MySQL/Postgres, поднимается отдельно из backend-laravel/.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_LARAVEL_API_URL: ${VITE_LARAVEL_API_URL:-/api}
    container_name: career-track-web
    restart: unless-stopped
    environment:
      LARAVEL_HOST: ${LARAVEL_HOST:-ct-laravel-nginx:80}
    ports:
      - "8080:80"
