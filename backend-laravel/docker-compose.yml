# Career Track — Laravel 11 backend
# Запуск:
#   1. cp overlay/.env.example .env  и отредактируйте секреты
#   2. docker compose up -d postgres redis
#   3. bash scripts/bootstrap.sh
#   4. bash scripts/import-supabase-dump.sh /path/to/careertrack.dump  (опционально)
#   5. docker compose up -d
#
# Все контейнеры монтируют ./app-src — это рабочая директория Laravel,
# создаваемая `bootstrap.sh` через `composer create-project`.

services:
  postgres:
    image: postgres:15-alpine
    container_name: ct-laravel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-careertrack}
      POSTGRES_USER: ${DB_USERNAME:-careertrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USERNAME:-careertrack}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ct-laravel-redis
    restart: unless-stopped
    volumes: [redis-data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  php-fpm:
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
    container_name: ct-laravel-php
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - ./app-src:/var/www/html
    env_file: .env

  nginx:
    image: nginx:1.27-alpine
    container_name: ct-laravel-nginx
    restart: unless-stopped
    depends_on: [php-fpm]
    ports: ["8000:80"]
    volumes:
      - ./app-src:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  reverb:
    build:
      context: .
      dockerfile: docker/reverb/Dockerfile
    container_name: ct-laravel-reverb
    restart: unless-stopped
    depends_on: [redis]
    ports: ["8080:8080"]
    volumes:
      - ./app-src:/var/www/html
    env_file: .env

  queue:
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
    container_name: ct-laravel-queue
    restart: unless-stopped
    depends_on:
      redis:    { condition: service_healthy }
      postgres: { condition: service_healthy }
    volumes:
      - ./app-src:/var/www/html
    env_file: .env
    command: ["php", "artisan", "queue:work", "--sleep=2", "--tries=3", "--max-time=3600"]

volumes:
  postgres-data:
  redis-data:
