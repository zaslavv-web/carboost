# ============================================================
# nginx для self-hosted фронта Career Track / Пик Роста.
#
# Помимо раздачи SPA проксирует API Supabase (auth, rest, storage,
# realtime, functions, pg) на upstream-хост. Это нужно, чтобы
# пользователи из регионов, где блокируется *.supabase.co
# (например, РФ), могли заходить в личный кабинет без VPN —
# весь трафик идёт через ваш домен.
#
# Upstream задаётся переменной окружения SUPABASE_HOST (без схемы),
# например: SUPABASE_HOST=wwmdzrzguicinvxibbqv.supabase.co
# Подставляется через envsubst в entrypoint nginx:1.27-alpine
# (см. Dockerfile — CMD оборачивает envsubst, если переменная задана).
# По-умолчанию proxy_pass отключён (упадёт на 502, если не настроено).
# ============================================================

# Карта: если SUPABASE_HOST не задан — отдаём 502 без сетевого вызова.
map "" $supabase_upstream {
    default "${SUPABASE_HOST}";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Чуть больше для PostgREST/Storage заголовков и Sanctum cookies
    large_client_header_buffers 4 16k;
    client_max_body_size 50m;

    # --- Проксирование Supabase API (обход блокировки *.supabase.co) ---
    location ~ ^/(auth/v1|rest/v1|storage/v1|realtime/v1|functions/v1|pg)/ {
        if ($supabase_upstream = "") {
            return 502 "SUPABASE_HOST is not configured";
        }

        proxy_pass https://$supabase_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $supabase_upstream;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Realtime / long-polling
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Длинный кэш на ассеты с хэшем
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback (React Router, BrowserRouter)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Базовая безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
