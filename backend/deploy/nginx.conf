# ============================================================
# nginx для self-hosted фронта Career Track / Пик Роста (Phase 13).
#
# Раздаёт SPA и проксирует API на Laravel-бэкенд. Никакого
# *.supabase.co прокси больше нет — весь backend живёт на
# вашем домене, что снимает блокировку в РФ без VPN.
#
# Upstream Laravel задаётся переменной окружения LARAVEL_HOST
# (например, app:9000 при docker-compose или 127.0.0.1:8000 при
# локальном PHP-сервере). По-умолчанию пытается ходить в `app`
# из той же compose-сети.
#
# Подставляется через envsubst в entrypoint nginx:1.27-alpine
# (см. Dockerfile — образ умеет /etc/nginx/templates/*.template).
# ============================================================

map "" $laravel_upstream {
    default "${LARAVEL_HOST}";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Чуть больше для Sanctum cookies / больших JSON ответов
    large_client_header_buffers 4 16k;
    client_max_body_size 50m;

    # --- API на Laravel ---
    location ~ ^/(api|sanctum|broadcasting|storage|login/.*|logout|oauth)/ {
        if ($laravel_upstream = "") {
            return 502 "LARAVEL_HOST is not configured";
        }

        proxy_pass http://$laravel_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSockets для Reverb / long-polling
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Длинный кэш на ассеты с хэшем
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback (React Router, BrowserRouter)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Базовая безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
