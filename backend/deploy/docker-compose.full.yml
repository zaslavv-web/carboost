# Полный self-hosted стек Career Track / Growth Peak.
#
# Запускает в одной сети:
#   - postgres        (хранилище)
#   - supabase-auth   (GoTrue, /auth/v1/*)
#   - supabase-rest   (PostgREST, /rest/v1/*)
#   - supabase-realtime
#   - supabase-storage
#   - supabase-meta   (для Studio)
#   - supabase-studio (админка БД, http://<host>:3001)
#   - kong            (API gateway, объединяет /auth, /rest, /realtime, /storage)
#   - web             (фронтенд Career Track, https://app.example.com)
#   - caddy           (TLS reverse-proxy с авто Let's Encrypt)
#
# Перед запуском:
#   1. cp .env.example .env  и отредактируйте все переменные
#   2. docker compose -f deploy/docker-compose.full.yml up -d
#   3. Откройте https://app.example.com — фронт; https://admin.example.com — Studio
#
# Для production-данных используйте restore из дампа Lovable Cloud
# (см. DEPLOYMENT.md §2 "Перенос данных").

x-supabase-env: &supabase-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}

services:
  postgres:
    image: supabase/postgres:15.6.1.139
    container_name: ct-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET:?required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    image: supabase/gotrue:v2.158.1
    container_name: ct-auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@postgres:5432/postgres
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${SUPABASE_PUBLIC_URL:?required}
      GOTRUE_SITE_URL: ${SITE_URL:?required}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOOGLE_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${SUPABASE_PUBLIC_URL}/auth/v1/callback
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-admin@example.com}
      GOTRUE_MAILER_AUTOCONFIRM: ${MAILER_AUTOCONFIRM:-false}

  rest:
    image: postgrest/postgrest:v12.2.3
    container_name: ct-rest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@postgres:5432/postgres
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"

  realtime:
    image: supabase/realtime:v2.30.34
    container_name: ct-realtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_ENC_KEY: supabaserealtime
      JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE:?64-char random}
      APP_NAME: realtime

  storage:
    image: supabase/storage-api:v1.11.13
    container_name: ct-storage
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ANON_KEY: ${ANON_KEY:?required}
      SERVICE_KEY: ${SERVICE_ROLE_KEY:?required}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@postgres:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
    volumes:
      - storage-data:/var/lib/storage

  meta:
    image: supabase/postgres-meta:v0.84.2
    container_name: ct-meta
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

  studio:
    image: supabase/studio:20240729-ce42139
    container_name: ct-studio
    restart: unless-stopped
    ports: ["3001:3000"]
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      STUDIO_PG_META_URL: http://meta:8080
      DEFAULT_ORGANIZATION_NAME: ${ORG_NAME:-Career Track}
      DEFAULT_PROJECT_NAME: ${PROJECT_NAME:-careertrack}

  functions:
    image: supabase/edge-runtime:v1.58.2
    container_name: ct-functions
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY:?required}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY:?required}
      SUPABASE_DB_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      JWT_SECRET: ${JWT_SECRET}
      VERIFY_JWT: "false"
      AI_API_URL: ${AI_API_URL:-https://api.openai.com/v1/chat/completions}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      LOVABLE_API_KEY: ${LOVABLE_API_KEY:-}
    volumes:
      - ../supabase/functions:/home/deno/functions:ro
    command:
      - start
      - --main-service
      - /home/deno/functions/_shared
      - --port
      - "9000"

  kong:
    image: kong:2.8.1
    container_name: ct-kong
    restart: unless-stopped
    depends_on: [auth, rest, realtime, storage, functions]
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
    volumes:
      - ./kong.yml:/var/lib/kong/kong.yml:ro

  web:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${SUPABASE_PUBLIC_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${ANON_KEY}
        VITE_SUPABASE_PROJECT_ID: ${PROJECT_ID:-self-hosted}
    container_name: ct-web
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    container_name: ct-caddy
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    depends_on: [web, kong]
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?e.g. app.example.com}
      API_DOMAIN: ${API_DOMAIN:?e.g. api.example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  storage-data:
  caddy-data:
  caddy-config:
