apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ct.fullname" . }}-web
spec:
  replicas: 2
  selector: { matchLabels: { app: ct-web } }
  template:
    metadata: { labels: { app: ct-web } }
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.web.repository }}:{{ .Values.image.web.tag }}"
          imagePullPolicy: {{ .Values.image.web.pullPolicy }}
          ports: [{ containerPort: 80 }]
          resources: {{ toYaml .Values.resources.web | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata: { name: {{ include "ct.fullname" . }}-web }
spec:
  selector: { app: ct-web }
  ports: [{ port: 80, targetPort: 80 }]
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ct.fullname" . }}-web
  annotations:
    {{- if .Values.ingress.tls }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts: [{{ .Values.domain.app }}]
      secretName: ct-web-tls
  {{- end }}
  rules:
    - host: {{ .Values.domain.app }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ct.fullname" . }}-web
                port: { number: 80 }
{{- end }}
