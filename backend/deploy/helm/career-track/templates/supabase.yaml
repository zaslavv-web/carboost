{{/*
  Полный self-hosted Supabase стек: auth, rest, realtime, storage, kong API gateway.
  Studio выкладывается отдельным Service (по желанию через ingress на admin.<domain>).
*/}}
{{- $fullname := include "ct.fullname" . -}}
{{- $secret := printf "%s-secrets" $fullname -}}
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: {{ $fullname }}-auth }
spec:
  replicas: 1
  selector: { matchLabels: { app: ct-auth } }
  template:
    metadata: { labels: { app: ct-auth } }
    spec:
      containers:
        - name: gotrue
          image: {{ .Values.supabase.auth.image }}
          env:
            - { name: GOTRUE_DB_DRIVER, value: postgres }
            - name: GOTRUE_DB_DATABASE_URL
              value: "postgres://supabase_auth_admin:$(POSTGRES_PASSWORD)@{{ $fullname }}-postgres:5432/postgres"
            - { name: GOTRUE_API_HOST, value: "0.0.0.0" }
            - { name: GOTRUE_API_PORT, value: "9999" }
            - { name: API_EXTERNAL_URL, value: "https://{{ .Values.domain.api }}" }
            - { name: GOTRUE_SITE_URL, value: "https://{{ .Values.domain.app }}" }
            - { name: GOTRUE_URI_ALLOW_LIST, value: "https://{{ .Values.domain.app }}/**" }
            - { name: GOTRUE_JWT_AUD, value: authenticated }
            - { name: GOTRUE_JWT_DEFAULT_GROUP_NAME, value: authenticated }
            - { name: GOTRUE_EXTERNAL_GOOGLE_ENABLED, value: "{{ .Values.supabase.auth.google.enabled }}" }
            - { name: GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID, value: "{{ .Values.supabase.auth.google.clientId }}" }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ $secret }}, key: POSTGRES_PASSWORD } }
            - name: GOTRUE_JWT_SECRET
              valueFrom: { secretKeyRef: { name: {{ $secret }}, key: JWT_SECRET } }
            - name: GOTRUE_EXTERNAL_GOOGLE_SECRET
              valueFrom: { secretKeyRef: { name: {{ $secret }}, key: GOOGLE_SECRET } }
          ports: [{ containerPort: 9999 }]
---
apiVersion: v1
kind: Service
metadata: { name: {{ $fullname }}-auth }
spec:
  selector: { app: ct-auth }
  ports: [{ port: 9999, targetPort: 9999 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: {{ $fullname }}-rest }
spec:
  replicas: 2
  selector: { matchLabels: { app: ct-rest } }
  template:
    metadata: { labels: { app: ct-rest } }
    spec:
      containers:
        - name: postgrest
          image: {{ .Values.supabase.rest.image }}
          env:
            - name: PGRST_DB_URI
              value: "postgres://authenticator:$(POSTGRES_PASSWORD)@{{ $fullname }}-postgres:5432/postgres"
            - { name: PGRST_DB_SCHEMAS, value: "public,storage" }
            - { name: PGRST_DB_ANON_ROLE, value: anon }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ $secret }}, key: POSTGRES_PASSWORD } }
            - name: PGRST_JWT_SECRET
              valueFrom: { secretKeyRef: { name: {{ $secret }}, key: JWT_SECRET } }
          ports: [{ containerPort: 3000 }]
---
apiVersion: v1
kind: Service
metadata: { name: {{ $fullname }}-rest }
spec:
  selector: { app: ct-rest }
  ports: [{ port: 3000, targetPort: 3000 }]
{{/*
  realtime, storage, kong, studio — добавьте по тому же шаблону.
  Для production-стенда рекомендуется использовать официальный
  https://github.com/supabase-community/supabase-kubernetes
  с values из этого файла.
*/}}
