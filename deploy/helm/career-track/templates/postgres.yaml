{{- if .Values.postgres.enabled -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ct.fullname" . }}-postgres
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: {{ .Values.postgres.persistence.size }} } }
  {{- with .Values.postgres.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ct.fullname" . }}-postgres
spec:
  serviceName: {{ include "ct.fullname" . }}-postgres
  replicas: 1
  selector: { matchLabels: { app: ct-postgres } }
  template:
    metadata: { labels: { app: ct-postgres } }
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          env:
            - { name: POSTGRES_DB, value: postgres }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "ct.fullname" . }}-secrets, key: POSTGRES_PASSWORD } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: {{ include "ct.fullname" . }}-secrets, key: JWT_SECRET } }
          ports: [{ containerPort: 5432 }]
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
          resources: {{ toYaml .Values.resources.postgres | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: {{ include "ct.fullname" . }}-postgres }
---
apiVersion: v1
kind: Service
metadata: { name: {{ include "ct.fullname" . }}-postgres }
spec:
  selector: { app: ct-postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
{{- end -}}
