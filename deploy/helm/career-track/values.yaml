# Helm values для Career Track. Перед установкой переопределите домены и секреты:
#   helm install ct ./deploy/helm/career-track \
#     --set domain.app=app.example.com \
#     --set domain.api=api.example.com \
#     --set secrets.postgresPassword=$(openssl rand -hex 24) \
#     --set secrets.jwtSecret=$(openssl rand -hex 32) \
#     --set secrets.anonKey=$ANON_KEY \
#     --set secrets.serviceRoleKey=$SERVICE_ROLE_KEY \
#     --set ai.apiKey=sk-...

image:
  web:
    repository: ghcr.io/your-org/career-track
    tag: latest
    pullPolicy: IfNotPresent

domain:
  app: app.example.com
  api: api.example.com

ingress:
  enabled: true
  className: nginx
  tls: true              # cert-manager + Let's Encrypt
  clusterIssuer: letsencrypt-prod

postgres:
  enabled: true          # выключите если у вас уже есть managed Postgres
  image: supabase/postgres:15.6.1.139
  persistence:
    size: 20Gi
    storageClass: ""

supabase:
  auth:
    image: supabase/gotrue:v2.158.1
    google:
      enabled: false
      clientId: ""
      secret: ""
  rest:
    image: postgrest/postgrest:v12.2.3
  realtime:
    image: supabase/realtime:v2.30.34
  storage:
    image: supabase/storage-api:v1.11.13
    persistence:
      size: 10Gi
  studio:
    enabled: true
    image: supabase/studio:20240729-ce42139

kong:
  image: kong:2.8.1

secrets:
  postgresPassword: CHANGE_ME
  jwtSecret: CHANGE_ME_64_CHARS
  anonKey: ""
  serviceRoleKey: ""
  realtimeSecretKeyBase: ""

smtp:
  host: ""
  port: 587
  user: ""
  pass: ""
  adminEmail: admin@example.com

ai:
  apiUrl: https://api.openai.com/v1/chat/completions
  apiKey: ""
  model: gpt-4o-mini

resources:
  web:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  postgres:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: 2000m, memory: 4Gi }
