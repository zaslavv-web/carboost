# Server-блок host-nginx для growth-peak.pro c подпутём /sandstorm/.
#
# Подразумевается, что прод и песочница работают на одном сервере,
# host-nginx терминирует TLS и проксирует:
#   /            → ct-prod-web:80
#   /api/        → ct-prod-laravel:80
#   /sandstorm/  → ct-sand-web:80 (фронт со своим base path)
#   /sandstorm/api/ → ct-sand-laravel:80
#
# Положить в /etc/nginx/sites-available/growth-peak.pro и подключить через symlink.

server {
    listen 443 ssl http2;
    server_name growth-peak.pro;

    # ssl_certificate / ssl_certificate_key — выдаются certbot'ом отдельно.

    client_max_body_size 50M;

    # --- PROD фронт ---
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- PROD api ---
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # --- SANDSTORM фронт ---
    # Vite-сборка собрана с base=/sandstorm/, поэтому все asset-пути уже содержат префикс.
    location /sandstorm/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /sandstorm;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- SANDSTORM api ---
    # Снимаем префикс /sandstorm/ перед проксированием на Laravel, чтобы тот видел /api/...
    location /sandstorm/api/ {
        rewrite ^/sandstorm/api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /sandstorm;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}
